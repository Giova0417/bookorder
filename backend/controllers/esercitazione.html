<form to="/registrati" type="hidden">

    <button>Registrami</button>
</form>

<form method="POST">
    <label for id="email">Email:</label>
    <input type="email" id="email" name="email" checkvalue>
    <label for id="pwd">Password:</label>
    <input type="password" id="pwd" name="password">
    <button>Invia</button>
</form>


<form action="/prenotazione" method="POST">

    <button type="reset">Pulisci</button>
</form>
